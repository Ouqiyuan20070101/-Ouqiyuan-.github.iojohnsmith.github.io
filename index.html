<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D立方体</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
    }

    .scene {
      width: 200px;
      height: 200px;
      perspective: 600px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: translateZ(-100px);
      animation: rotate 10s infinite linear;
    }

    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      border: 2px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, rgba(255, 0, 150, 0.8), rgba(0, 204, 255, 0.8));
      backface-visibility: visible;
    }

    .front  { transform: translateZ(100px); }
    .back   { transform: translateZ(-100px) rotateY(180deg); }
    .right  { transform: translateX(100px) rotateY(90deg); }
    .left   { transform: translateX(-100px) rotateY(-90deg); }
    .top    { transform: translateY(-100px) rotateX(90deg); }
    .bottom { transform: translateY(100px) rotateX(-90deg); }

    /* 对特定面使用skew变换 */
    .front  { transform: translateZ(100px) skewX(5deg); }
    .back   { transform: translateZ(-100px) rotateY(180deg) skewY(-5deg); }

    @keyframes rotate {
      from { transform: translateZ(-100px) rotateX(0deg) rotateY(0deg); }
      to   { transform: translateZ(-100px) rotateX(360deg) rotateY(360deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cube">
      <div class="face front">前面</div>
      <div class="face back">后面</div>
      <div class="face right">右面</div>
      <div class="face left">左面</div>
      <div class="face top">顶面</div>
      <div class="face bottom">底面</div>
    </div>
  </div>
</body>
</html>
